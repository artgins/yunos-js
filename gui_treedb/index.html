<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title></title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <!--
    CSP_PLACEHOLDER is replaced at build time by the Vite yuneta-html-transform plugin.
    The connect-src origins are read from config.json "csp_connect_src" array.
    Keep that array in sync with backend_config.js (backend_urls + bff_urls + keycloak auth-server-url).
  -->
  <!-- CSP_PLACEHOLDER -->

  <link rel="icon" href="/treedb-mark.svg" type="image/svg+xml">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="apple-touch-icon" href="/treedb-mark.svg">

<!-- METADATA_PLACEHOLDER -->
  <meta name="theme-color" content="#0D9488">
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    #loading-message {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.15rem;
      background: linear-gradient(135deg, #14B8A6 0%, #115E59 100%);
      color: #ECFDF5;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    #loading-message .ld-logo {
      width: 78px; height: 78px;
      filter: drop-shadow(0 12px 26px rgba(0, 0, 0, 0.35));
      animation: ld-pop 480ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }
    #loading-message .ld-title {
      font-size: 1.5rem; font-weight: 700; letter-spacing: -0.01em;
    }
    #loading-message .ld-row {
      display: flex; align-items: center; gap: 0.55rem;
      font-size: 0.92rem; opacity: 0.88;
    }
    #loading-message .ld-spin {
      width: 17px; height: 17px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: #5EEAD4;
      border-radius: 50%;
      animation: ld-spin 750ms linear infinite;
    }
    @keyframes ld-spin { to { transform: rotate(360deg); } }
    @keyframes ld-pop {
      0%   { opacity: 0; transform: translateY(8px) scale(0.9); }
      100% { opacity: 1; transform: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      #loading-message .ld-spin, #loading-message .ld-logo { animation: none; }
    }
  </style>

</head>
<body>
  <div id="loading-message">
    <svg class="ld-logo" viewBox="0 0 64 64" aria-hidden="true">
      <rect x="0" y="0" width="64" height="64" rx="15" fill="rgba(255,255,255,0.14)"/>
      <g stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round" opacity="0.9">
        <line x1="32" y1="16" x2="17" y2="34"/>
        <line x1="32" y1="16" x2="47" y2="34"/>
        <line x1="17" y1="34" x2="32" y2="49"/>
        <line x1="47" y1="34" x2="32" y2="49"/>
      </g>
      <circle cx="32" cy="16" r="6" fill="#FFFFFF"/>
      <circle cx="17" cy="34" r="5.2" fill="#FFFFFF"/>
      <circle cx="47" cy="34" r="5.2" fill="#FFFFFF"/>
      <circle cx="32" cy="49" r="6" fill="#5EEAD4"/>
    </svg>
    <div class="ld-title">TreeDB GUI</div>
    <div class="ld-row"><span class="ld-spin"></span><span>Loading…</span></div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
