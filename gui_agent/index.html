<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/agent-mark.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/agent-mark.svg">
    <!--
        CSP_PLACEHOLDER is replaced at build time by the @yuneta/gobj-ui
        html-transform Vite plugin. The connect-src origins are read from
        config.json "csp_connect_src".
    -->
    <!-- CSP_PLACEHOLDER -->

<!-- METADATA_PLACEHOLDER -->

    <meta name="theme-color" content="#1F3A5F">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .view-card {
            padding: 0.75rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            box-sizing: border-box;
        }
        .view-card h1 { margin: 0; }
        .view-card .bg {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: rgba(0,0,0,0.25);
            border: 2px dashed rgba(0,0,0,0.15);
            border-radius: 0.5rem;
            text-align: center;
            padding: 1rem;
        }
        #loading-message {
            display: flex;
            padding: 2em;
            font-size: 18px;
            background-color: #F4F6F8;
            color: #1F3A5F;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="loading-message">
        Loading Yuneta Agent Console. Please wait...
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
