<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <!--
        interactive-widget=resizes-content: when the on-screen keyboard opens,
        shrink the LAYOUT viewport (not just the visual one) so `height:100%`
        chains reflow above the keyboard. Without it Android Chrome overlays the
        keyboard and hides the bottom of the Terminal (prompt/input line).
        Ignored by browsers that don't support it (graceful fallback).
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/agent-mark.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/agent-mark.svg">
    <!--
        CSP_PLACEHOLDER is replaced at build time by the @yuneta/gobj-ui
        html-transform Vite plugin. The connect-src origins are read from
        config.json "csp_connect_src".
    -->
    <!-- CSP_PLACEHOLDER -->

<!-- METADATA_PLACEHOLDER -->

    <meta name="theme-color" content="#1F3A5F">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .view-card {
            padding: 0.75rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            box-sizing: border-box;
        }
        .view-card h1 { margin: 0; }
        .view-card .bg {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: rgba(0,0,0,0.25);
            border: 2px dashed rgba(0,0,0,0.15);
            border-radius: 0.5rem;
            text-align: center;
            padding: 1rem;
        }
        #loading-message {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 1.15rem;
            background: linear-gradient(135deg, #2563EB 0%, #1E3A8A 100%);
            color: #EFF6FF;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        #loading-message .ld-logo {
            width: 74px; height: 74px; border-radius: 16px;
            filter: drop-shadow(0 12px 26px rgba(0, 0, 0, 0.35));
            animation: ld-pop 480ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }
        #loading-message .ld-title {
            font-size: 1.5rem; font-weight: 700; letter-spacing: -0.01em;
        }
        #loading-message .ld-row {
            display: flex; align-items: center; gap: 0.55rem;
            font-size: 0.92rem; opacity: 0.88;
        }
        #loading-message .ld-spin {
            width: 17px; height: 17px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #7DD3FC;
            border-radius: 50%;
            animation: ld-spin 750ms linear infinite;
        }
        @keyframes ld-spin { to { transform: rotate(360deg); } }
        @keyframes ld-pop {
            0%   { opacity: 0; transform: translateY(8px) scale(0.9); }
            100% { opacity: 1; transform: none; }
        }
        @media (prefers-reduced-motion: reduce) {
            #loading-message .ld-spin, #loading-message .ld-logo { animation: none; }
        }
    </style>
</head>
<body>
    <div id="loading-message">
        <img class="ld-logo" src="/agent-mark.svg" alt="">
        <div class="ld-title">Agent Console</div>
        <div class="ld-row"><span class="ld-spin"></span><span>Loading…</span></div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
